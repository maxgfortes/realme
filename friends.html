<div class="option-bar">
  <div class="options-header">
    <div class="opt-left">
      <button class="close-btn" id="closeOptionsBtn">

      </button>
    </div>
    <div class="opt-center">Filtros e opções</div>
    <div class="opt-right"></div>
  </div>
  <div class="options">
    <div class="filtros">
      <div class="estilo">
        <p>Estilo</p>
        <input class="estilo" type="text" placeholder="gotico, alternativo, sk8 archive...">
      </div>
      <div class="estilo">
        <p>Personalidade</p>
        <input class="estilo" type="text" placeholder="extrovertido, introvertido...">
      </div>
      <div class="estilo">
        <p>Sonhos e Desejos</p>
        <input class="estilo" type="text" placeholder="Conexão real, Amor, Dinheiro...">
      </div>
      <div class="estilo">
        <p>Musicas</p>
        <input class="estilo" type="text" placeholder="Rock, Grunge, Pop, Alt, Indie...">
      </div>
      <div class="estilo">
        <p>Personagens</p>
        <input class="estilo" type="text" placeholder="Jesse Pinkman, Cassie, Marla...">
      </div>
      <div class="estilo">
        <p>localização</p>
        <input class="estilo" type="text" placeholder="São Paulo, Porto Alegre...">
      </div>
      <div class="estilo">
        <p>Hobbies</p>
        <input class="estilo" type="text" placeholder="Esportes, Pintura, Musica...">
      </div>
    </div>
    <div class="search-btn-area">
      <div class="opt-bottom">
        <div class="lm">
          <p>Igual a mim</p>
          <label class="switch">
            <input type="checkbox" id="igualAMim">
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <button class="search-btn">Buscar</button>
    </div>
  </div>
</div>
