  <style>

    .post-header {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }


    .user-meta strong {
      font-size: 16px;
      color: #fff;
    }

    .post-text {
      margin: 0px 0;
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .post-actions {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
    }

    .post-actions button {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.3s;
      font-size: 15px;
    }

    .post-actions button:hover {
      color: #4A90E2;
    }

    .post-date {
      font-size: 13px;
      color: #999;
      text-align: right;
    }

    @media (max-width: 600px) {
  .post-card {
    padding: 15px;
  }

  .avatar {
    width: 40px;
    height: 40px;
  }

  .user-meta strong {
    font-size: 15px;
  }

  .post-text {
    font-size: 15px !important;
  }

  .post-actions {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  .post-actions button {
    font-size: 14px;
  }

  .post-date {
    font-size: 12px;
    text-align: left;
    margin-top: 10px;
  }

  #load-more-btn {
    display: none;
  }
}




.menu-bottom-layer {
  display: none;
}
  .post-modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .menu-bottom-layer {
    display: none;
    position: fixed;
    bottom: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 99998;
    background: transparent;
  }
  </style>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .then(() => console.log(''))
      .catch(err => console.error('', err));
    navigator.serviceWorker.register('/firebase-messaging-sw.js')
      .then(() => console.log(''))
      .catch(err => console.warn('', err));
  });
}


const overlay = document.getElementById("feeling-overlay");
const openBtn = document.getElementById("create-feeling-btn");
const cancelBtn = document.getElementById("cancelarFeeling");

openBtn.addEventListener("click", () => {
  overlay.classList.add("active");
});

overlay.addEventListener("click", (e) => {
  if (e.target === overlay) {
    overlay.classList.remove("active");
  }
});

cancelBtn.addEventListener("click", () => {
  overlay.classList.remove("active");
});

document.addEventListener('DOMContentLoaded', () => {
  const navbar = document.querySelector('.navbar-top');
  const container = document.querySelector('.welcome-container');

  let lastY = 0;
  let current = 0;

  const START_HIDE_AT = 60;
  const MAX = 100;

  function clamp(n, min, max) {
    return Math.max(min, Math.min(max, n));
  }

  container.addEventListener('scroll', () => {
    const y = container.scrollTop;
    const delta = y - lastY;
    if (y < START_HIDE_AT) {
      current = 0;
      navbar.classList.remove('hidden');
      navbar.style.transform = 'translateY(0%)';
      lastY = y;
      return;
    }

    if (delta > 0) {
      current = clamp(current + 18, 0, MAX);
    }

    if (delta < 0) {
      current = clamp(current - 18, 0, MAX);
    }

    navbar.classList.add('hidden');
    navbar.style.transform = `translateY(-${current}%)`;
    if (current <= 0) {
      navbar.classList.remove('hidden');
    }
    lastY = y;
  }, { passive: true });
});
</script>
